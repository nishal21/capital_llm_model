name: Data Correction
description: Report incorrect data in the database
labels: ["data-correction"]
body:
  - type: dropdown
    id: entity-type
    attributes:
      label: Entity Type
      description: What type of data needs correcting?
      options:
        - City
        - State/Province
        - Country
    validations:
      required: true

  - type: input
    id: entity-name
    attributes:
      label: Entity Name
      description: Name of the entity with incorrect data
      placeholder: "e.g., Los Angeles"
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country
      description: Country (and state if applicable)
      placeholder: "e.g., United States (US) / California (CA)"
    validations:
      required: true

  - type: textarea
    id: current-data
    attributes:
      label: Current (Incorrect) Data
      description: What is currently in the database?
      placeholder: |
        e.g., latitude: 34.0000000, longitude: -118.0000000
    validations:
      required: true

  - type: textarea
    id: correct-data
    attributes:
      label: Correct Data
      description: What should the data be?
      placeholder: |
        e.g., latitude: 34.0522300, longitude: -118.2436800
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Source URL
      description: Link to an official source verifying the correct data
      placeholder: "https://..."
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information
    validations:
      required: false
