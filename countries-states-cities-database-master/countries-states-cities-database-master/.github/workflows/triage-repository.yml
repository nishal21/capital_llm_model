name: Triage Repository

on:
  workflow_dispatch:
    inputs:
      triage_issues:
        description: 'Triage open issues (label, categorise, add templates)'
        type: boolean
        default: true
      triage_prs:
        description: 'Triage open PRs (label stale, close abandoned)'
        type: boolean
        default: true
      send_digest:
        description: 'Send Slack digest summary'
        type: boolean
        default: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  triage:
    name: Triage issues and PRs
    runs-on: ubuntu-latest

    steps:
      - name: Triage open issues
        if: inputs.triage_issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fetch all open issues (paginated)
            let issues = [];
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.issues.listForRepo({
                owner, repo,
                state: 'open',
                per_page: 100,
                page,
              });
              issues = issues.concat(batch);
              if (batch.length < 100) break;
              page++;
            }

            // Filter out PRs
            const actualIssues = issues.filter((i) => !i.pull_request);
            core.info(`Found ${actualIssues.length} open issues to triage`);

            let labelled = 0;
            let templated = 0;

            for (const issue of actualIssues) {
              const labels = issue.labels.map((l) => l.name);
              const body = (issue.body || '').toLowerCase();
              const title = (issue.title || '').toLowerCase();
              const combined = `${title} ${body}`;
              const newLabels = [];

              // Skip already triaged issues (have labels beyond needs-triage)
              if (!labels.includes('needs-triage') && labels.length > 1) continue;

              // Auto-categorise by keywords
              if (combined.match(/incorrect|wrong|typo|spelling|misspell/)) {
                if (!labels.includes('data-correction')) newLabels.push('data-correction');
              }
              if (combined.match(/missing|add|new city|new state|not found|doesn.t exist/)) {
                if (!labels.includes('data-addition')) newLabels.push('data-addition');
              }
              if (combined.match(/duplicate|already exist/)) {
                if (!labels.includes('bug')) newLabels.push('bug');
              }
              if (combined.match(/api|endpoint|rate.limit|token|authentication/)) {
                if (!labels.includes('bug')) newLabels.push('bug');
              }
              if (combined.match(/documentation|docs|readme|example/)) {
                if (!labels.includes('documentation')) newLabels.push('documentation');
              }
              if (combined.match(/feature|enhancement|request|suggestion|would be nice/)) {
                if (!labels.includes('enhancement')) newLabels.push('enhancement');
              }

              // If no category found but has needs-triage, add help-wanted
              if (newLabels.length === 0 && labels.includes('needs-triage')) {
                newLabels.push('help-wanted');
              }

              if (newLabels.length > 0) {
                try {
                  await github.rest.issues.addLabels({
                    owner, repo,
                    issue_number: issue.number,
                    labels: newLabels,
                  });
                  labelled++;
                } catch (err) {
                  core.warning(`Could not label issue #${issue.number}: ${err.message}`);
                }

                // Remove needs-triage label
                if (labels.includes('needs-triage')) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo,
                      issue_number: issue.number,
                      name: 'needs-triage',
                    });
                  } catch {
                    // Label might not exist
                  }
                }
              }

              // Add template comment for data corrections without details
              if (newLabels.includes('data-correction') && (!issue.body || issue.body.length < 200)) {
                const existingComments = await github.rest.issues.listComments({
                  owner, repo,
                  issue_number: issue.number,
                  per_page: 10,
                });

                const hasTemplate = existingComments.data.some(
                  (c) => c.body && c.body.includes('Entity type')
                );

                if (!hasTemplate) {
                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: issue.number,
                    body: [
                      'Thanks for reporting this data correction! To help us process this efficiently, please ensure you have provided:',
                      '',
                      '- [ ] **Entity type** (city, state, or country)',
                      '- [ ] **Entity name** and current incorrect data',
                      '- [ ] **Correct data** with source URL',
                      '- [ ] **Country/State** context',
                      '',
                      'If you\'d like to fix this yourself, you can submit a PR editing the relevant file in the `contributions/` directory.',
                      'Alternatively, use our [CSC Update Tool](https://manager.countrystatecity.in/) for a guided process.',
                    ].join('\n'),
                  });
                  templated++;
                }
              }
            }

            core.info(`Issue triage complete: ${labelled} labelled, ${templated} templates added`);

      - name: Triage open PRs
        if: inputs.triage_prs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const WARNING_DAYS = 21;
            const CLOSE_DAYS = 30;
            const now = new Date();
            let closedCount = 0;
            let warnedCount = 0;
            let labelledCount = 0;

            // Fetch all open PRs (paginated)
            let prs = [];
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.pulls.list({
                owner, repo,
                state: 'open',
                sort: 'updated',
                direction: 'asc',
                per_page: 100,
                page,
              });
              prs = prs.concat(batch);
              if (batch.length < 100) break;
              page++;
            }

            core.info(`Found ${prs.length} open PRs to triage`);

            for (const pr of prs) {
              const labels = pr.labels.map((l) => l.name);

              // Auto-label entity types from changed files
              if (!labels.some((l) => l.startsWith('data:'))) {
                try {
                  const { data: files } = await github.rest.pulls.listFiles({
                    owner, repo,
                    pull_number: pr.number,
                    per_page: 50,
                  });

                  const entityLabels = new Set();
                  for (const file of files) {
                    if (!file.filename.startsWith('contributions/')) continue;
                    const lower = file.filename.toLowerCase();
                    if (lower.includes('cities')) entityLabels.add('data:cities');
                    else if (lower.includes('states')) entityLabels.add('data:states');
                    else if (lower.includes('countries')) entityLabels.add('data:countries');
                  }

                  if (entityLabels.size > 0) {
                    await github.rest.issues.addLabels({
                      owner, repo,
                      issue_number: pr.number,
                      labels: [...entityLabels],
                    });
                    labelledCount++;
                  }
                } catch (err) {
                  core.warning(`Could not label PR #${pr.number}: ${err.message}`);
                }
              }

              // Skip critical PRs for stale processing
              if (labels.includes('critical') || labels.includes('requires-maintainer-approval')) {
                continue;
              }

              const lastUpdated = new Date(pr.updated_at);
              const daysSinceUpdate = Math.floor((now - lastUpdated) / (1000 * 60 * 60 * 24));

              // Remove stale label if PR has had recent activity
              if (daysSinceUpdate < WARNING_DAYS && labels.includes('stale')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner, repo,
                    issue_number: pr.number,
                    name: 'stale',
                  });
                } catch {
                  // Label removal failed
                }
                continue;
              }

              // Close PRs stale for 30+ days
              if (daysSinceUpdate >= CLOSE_DAYS && labels.includes('stale')) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: pr.number,
                  body: [
                    ':hourglass: This PR has been automatically closed due to inactivity (30+ days).',
                    '',
                    'If you would like to continue working on this contribution, feel free to reopen the PR or create a new one.',
                    '',
                    'Thank you for your interest in improving the CSC database!',
                  ].join('\n'),
                });

                await github.rest.pulls.update({
                  owner, repo,
                  pull_number: pr.number,
                  state: 'closed',
                });

                closedCount++;
                core.info(`Closed stale PR #${pr.number} (${daysSinceUpdate} days inactive)`);
              }

              // Warn PRs inactive for 21+ days
              else if (daysSinceUpdate >= WARNING_DAYS && !labels.includes('stale')) {
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: pr.number,
                  body: [
                    `:warning: This PR has been inactive for ${daysSinceUpdate} days.`,
                    '',
                    'It will be automatically closed in **' + (CLOSE_DAYS - daysSinceUpdate) + ' days** if there is no further activity.',
                    '',
                    'If you are still working on this, please push a commit or leave a comment to keep it open.',
                  ].join('\n'),
                });

                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: ['stale'],
                });

                warnedCount++;
              }
            }

            core.info(`PR triage complete: ${labelledCount} labelled, ${warnedCount} warned, ${closedCount} closed`);

      - name: Send digest to Slack
        if: inputs.send_digest
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning('SLACK_WEBHOOK_URL not set. Skipping digest.');
              return;
            }

            const https = require('https');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get open PRs (paginated)
            let openPRs = [];
            let prPage = 1;
            while (true) {
              const { data: batch } = await github.rest.pulls.list({
                owner, repo,
                state: 'open',
                per_page: 100,
                page: prPage,
              });
              openPRs = openPRs.concat(batch);
              if (batch.length < 100) break;
              prPage++;
            }

            const criticalPRs = openPRs.filter((pr) => pr.labels.some((l) => l.name === 'critical')).length;
            const readyPRs = openPRs.filter((pr) => pr.labels.some((l) => l.name === 'ready-for-review')).length;
            const needsChangesPRs = openPRs.filter((pr) => pr.labels.some((l) => l.name === 'needs-changes')).length;
            const stalePRs = openPRs.filter((pr) => pr.labels.some((l) => l.name === 'stale')).length;

            // Get open issues
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              per_page: 100,
            });
            const actualIssues = openIssues.filter((i) => !i.pull_request);

            const dateStr = new Date().toLocaleDateString('en-GB', {
              weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
            });

            const payload = {
              attachments: [{
                color: '#4A90D9',
                blocks: [
                  {
                    type: 'header',
                    text: { type: 'plain_text', text: `:broom: Triage Report - ${dateStr}`, emoji: true },
                  },
                  {
                    type: 'section',
                    fields: [
                      { type: 'mrkdwn', text: `*Open PRs:* ${openPRs.length}` },
                      { type: 'mrkdwn', text: `*Open Issues:* ${actualIssues.length}` },
                      { type: 'mrkdwn', text: `*Critical:* ${criticalPRs}` },
                      { type: 'mrkdwn', text: `*Ready for Review:* ${readyPRs}` },
                      { type: 'mrkdwn', text: `*Needs Changes:* ${needsChangesPRs}` },
                      { type: 'mrkdwn', text: `*Stale:* ${stalePRs}` },
                    ],
                  },
                ],
              }],
            };

            const url = new URL(webhookUrl);
            const data = JSON.stringify(payload);
            await new Promise((resolve) => {
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname,
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) },
              }, (res) => {
                if (res.statusCode !== 200) core.warning(`Slack responded with ${res.statusCode}`);
                resolve();
              });
              req.on('error', (err) => {
                core.warning(`Slack error: ${err.message}`);
                resolve();
              });
              req.write(data);
              req.end();
            });
